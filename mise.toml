[tools]
dotnet = "10.0"

[tasks.restore]
description = "Restore dependencies"
run = "dotnet restore"

[tasks.tool-restore]
description = "Restore local dotnet tools"
run = "dotnet tool restore"

[tasks.paket-restore]
description = "Restore Paket dependencies"
run = "dotnet tool run paket restore"
depends = ["tool-restore"]

[tasks.build]
description = "Build the solution"
run = "dotnet build"
depends = ["restore", "paket-restore"]

[tasks.test]
description = "Run tests with coverage"
run = """
dotnet test --project tests/FSharpLintAnalyzerShim.Tests \
  --coverage \
  --coverage-output-format cobertura \
  --coverage-output "$PWD/coverage/FSharpLintAnalyzerShim/coverage.cobertura.xml"
"""
depends = ["build"]

[tasks.format]
description = "Format F# files with fantomas"
run = "dotnet fantomas LintAnalyzer.fs tests/"
depends = ["tool-restore"]

[tasks.format-check]
description = "Check F# formatting"
run = "dotnet fantomas --check LintAnalyzer.fs tests/"
depends = ["tool-restore"]

[tasks.lint]
description = "Run FSharpLint"
run = "dotnet fsharplint lint FSharpLintAnalyzerShim.slnx"
depends = ["build", "tool-restore"]

[tasks.coverage-check]
description = "Check per-file coverage meets minimum threshold"
run = "(cd coverage/FSharpLintAnalyzerShim && dotnet tool run coverageratchet check ../../coverage-ratchet-FSharpLintAnalyzerShim.json)"
depends = ["test"]

[tasks.coverage-ratchet]
description = "Tighten coverage thresholds to current values"
run = "(cd coverage/FSharpLintAnalyzerShim && dotnet tool run coverageratchet ratchet ../../coverage-ratchet-FSharpLintAnalyzerShim.json)"
depends = ["test"]

[tasks.coverage-loosen]
description = "Loosen coverage thresholds to current values"
run = "(cd coverage/FSharpLintAnalyzerShim && dotnet tool run coverageratchet loosen ../../coverage-ratchet-FSharpLintAnalyzerShim.json)"
depends = ["test"]

[tasks.loosen-from-ci]
description = "Merge coverage thresholds from CI artifacts"
run = "(cd coverage/FSharpLintAnalyzerShim && dotnet tool run coverageratchet loosen-from-ci ../../coverage-ratchet-FSharpLintAnalyzerShim.json)"
depends = ["test"]

[tasks.pack]
description = "Create NuGet package"
run = "dotnet pack FSharpLintAnalyzerShim.fsproj -c Release -o artifacts"
depends = ["restore", "paket-restore"]

[tasks.check-api]
description = "Check API changes since last release"
run = "dotnet tool run fssemantictagger check"
depends = ["restore", "tool-restore"]

[tasks.release]
description = "Tag a release based on API changes"
run = "dotnet tool run fssemantictagger release"
depends = ["restore", "tool-restore"]

[tasks.release-alpha]
description = "Tag an alpha release"
run = "dotnet tool run fssemantictagger alpha"
depends = ["restore", "tool-restore"]

[tasks.lint-project]
description = "Run FsProjLint"
run = "dotnet tool run fsprojlint"
depends = ["tool-restore"]

[tasks.check]
description = "Run all checks with auto-fix"
depends = ["format", "lint", "lint-project", "coverage-ratchet"]

[tasks.ci]
description = "Run all CI checks (no auto-fix)"
depends = ["format-check", "lint", "lint-project", "coverage-check"]
