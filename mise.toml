[tools]
dotnet = "10.0"

[tasks.build]
description = "Build the solution"
run = "dotnet build FSharpLintAnalyzerShim.slnx"

[tasks.test]
description = "Run tests"
run = "dotnet test --solution FSharpLintAnalyzerShim.slnx"

[tasks.fmt]
description = "Format F# files with fantomas"
run = "dotnet fantomas LintAnalyzer.fs tests/"

[tasks."fmt:check"]
description = "Check F# formatting"
run = "dotnet fantomas --check LintAnalyzer.fs tests/"

[tasks.lint]
description = "Run linters"
depends = ["fmt:check"]

[tasks.check]
description = "Run all checks"
depends = ["lint", "build", "test"]
