name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
      - run: dotnet tool restore
      - run: dotnet fantomas --check LintAnalyzer.fs tests/
      - run: dotnet build FSharpLintAnalyzerShim.slnx
      - run: dotnet test --solution FSharpLintAnalyzerShim.slnx
